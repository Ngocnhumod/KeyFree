<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 Meocua iOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#3b82f6,#7c3aed,#06b6d4);
    overflow:hidden;
}

/* Hiệu ứng lấp lánh */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(circle,rgba(255,255,255,.9) 1px,transparent 1px),
        radial-gradient(circle,rgba(255,255,255,.6) 1px,transparent 1px);
    background-size:80px 80px,120px 120px;
    animation:starMove 15s linear infinite;
    opacity:.4;
}

@keyframes starMove{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

.card{
    width:92%;
    max-width:430px;
    padding:28px;
    border-radius:32px;
    background:rgba(255,255,255,.16);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    color:#fff;
    text-align:center;
    font-size:30px;
    margin-bottom:8px;
}

.sub{
    text-align:center;
    color:#eef;
    margin-bottom:20px;
}

.btn{
    width:100%;
    margin:12px 0;
    padding:17px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,.18);
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 0 15px rgba(255,255,255,.15);
}

.btn:hover{
    transform:scale(1.03);
    box-shadow:0 0 25px rgba(255,255,255,.4);
}

.notice{
    margin-top:20px;
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);
    color:#fff;
    line-height:1.8;
    font-size:15px;
}

.notice h3{
    text-align:center;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    color:#fff;
    opacity:.75;
    margin-top:18px;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

    <h1>🍎 Meocua iOS</h1>
    <div class="sub">Tải nhanh • Giao diện phong cách iPhone ✨</div>

    <button class="btn"
        onclick="window.open('https://nhapma.com/v/Keylinktructiep','_blank')">
        🔑 Key Liên Tải Trực Tiếp
    </button>

    <button class="btn"
        onclick="window.open('https://nhapma.com/v/FoysqXl0qy','_blank')">
        ⌛Key Menu Free 1 Ngày
    </button>

    <button class="btn"
        onclick="window.open('https://nhapma.com/v/5Ql0Fx3myU','_blank')">
        🚀 Link Tải Trực Tiếp Không Cần Key
    </button>

    <div class="notice">
        <h3>📢 Lưu ý</h3>
        ✅ Tải ứng dụng bằng <b>Link Tải Trực Tiếp</b>.<br>
        ✅ Sau khi cài đặt, lấy <b>Key Free 1 Ngày</b>.<br>
        ✅ Mở menu và nhập key để sử dụng.<br>
        ✅ Key miễn phí có hiệu lực <b>1 ngày</b>, hết hạn chỉ cần lấy key mới là tiếp tục chơi.
    </div>

    <div class="footer">
        ✨ Chúc bạn trải nghiệm vui vẻ ✨
    </div>

</div>

<script>
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        btn.animate(
            [
                {transform:"scale(1)"},
                {transform:"scale(0.96)"},
                {transform:"scale(1.02)"},
                {transform:"scale(1)"}
            ],
            {duration:220}
        );
    });
});
</script>

</body>
</html>
